kommunity_partners:
- auto_configure: true
  identifier: local_arkitekt
  name: Local Arkitekt Services
  partner_kind: preauthorized
  preconfigured_composition:
    identifier: localhost
    instances:
    - aliases:
      - challenge: ht
        host: rekuest
        id: local_rekuest
        kind: relative
        name: Rekuest
        path: rekuest
        scope: public
        ssl: false
      identifier: local_rekuest
      manifest:
        description: Task orchestration and workflow execution
        identifier: live.arkitekt.rekuest
        roles:
        - description: Can act as a workflow agent
          key: agent
        - description: Can call remote procedures
          key: caller
        - description: Full administrative access
          key: admin
        scopes:
        - description: Act as an agent
          key: rekuest_agent
        - description: Call other apps with rekuest
          key: rekuest_call
        - description: Read access to rekuest resources
          key: read
        - description: Write access to rekuest resources
          key: write
        version: 1.0.0
    - aliases:
      - challenge: ht
        host: kabinet
        id: local_kabinet
        kind: relative
        name: Kabinet
        path: kabinet
        scope: public
        ssl: false
      identifier: local_kabinet
      manifest:
        description: Container and deployment management
        identifier: live.arkitekt.kabinet
        roles:
        - description: Full administrative access
          key: admin
        - description: Can deploy containers
          key: deployer
        - description: Standard user access
          key: user
        - description: Read-only access
          key: viewer
        scopes:
        - description: Add repositories to the database
          key: kabinet_add_repo
        - description: Deploy containers
          key: kabinet_deploy
        - description: Read container definitions
          key: kabinet_read
        - description: Generic read access
          key: read
        - description: Generic write access
          key: write
        version: 1.0.0
    - aliases:
      - challenge: ht
        host: mikro
        id: local_mikro
        kind: relative
        name: Mikro
        path: mikro
        scope: public
        ssl: false
      identifier: local_mikro
      manifest:
        description: Microscopy data management and analysis
        identifier: live.arkitekt.mikro
        roles:
        - description: Full administrative access
          key: admin
        - description: Standard user access
          key: user
        - description: Read-only access to images
          key: viewer
        - description: Can upload new images
          key: uploader
        scopes:
        - description: Read images from the database
          key: mikro_read
        - description: Write images to the database
          key: mikro_write
        - description: Read image data
          key: read_image
        - description: Generic read access
          key: read
        - description: Generic write access
          key: write
        version: 1.0.0
    - aliases:
      - challenge: ht
        host: fluss
        id: local_fluss
        kind: relative
        name: Fluss
        path: fluss
        scope: public
        ssl: false
      identifier: local_fluss
      manifest:
        description: Workflow definition and management
        identifier: live.arkitekt.fluss
        roles:
        - description: Full administrative access
          key: admin
        - description: Standard user access
          key: user
        - description: Can design workflows
          key: designer
        - description: Read-only access
          key: viewer
        scopes:
        - description: Read workflow definitions
          key: fluss_read
        - description: Create and modify workflows
          key: fluss_write
        - description: Execute workflows
          key: fluss_execute
        - description: Generic read access
          key: read
        - description: Generic write access
          key: write
        version: 1.0.0
    - aliases:
      - challenge: ht
        host: lok
        id: local_lok
        kind: relative
        name: Lok
        path: lok
        scope: public
        ssl: false
      identifier: local_lok
      manifest:
        description: Authentication and authorization (required)
        identifier: live.arkitekt.lok
        roles:
        - description: Full administrative access
          key: admin
        - description: Standard user access
          key: user
        - description: Automated bot access
          key: bot
        - description: Read-only access
          key: viewer
        - description: Read and write access
          key: editor
        scopes:
        - description: OpenID Connect scope
          key: openid
        - description: Generic read access
          key: read
        - description: Generic write access
          key: write
        - description: Access user profile
          key: profile
        - description: Access user email
          key: email
        version: 1.0.0
    - aliases:
      - challenge: ht
        host: kraph
        id: local_kraph
        kind: relative
        name: Kraph
        path: kraph
        scope: public
        ssl: false
      identifier: local_kraph
      manifest:
        description: Knowledge graph and data relationships
        identifier: live.arkitekt.kraph
        roles:
        - description: Full administrative access
          key: admin
        - description: Standard user access
          key: user
        - description: Can edit graph data
          key: editor
        - description: Read-only access
          key: viewer
        scopes:
        - description: Read graph data
          key: kraph_read
        - description: Write graph data
          key: kraph_write
        - description: Execute graph queries
          key: kraph_query
        - description: Generic read access
          key: read
        - description: Generic write access
          key: write
        version: 1.0.0
